<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Projects — Gana Sai Teja Velicheti">
  <link rel="icon" href="images/icons8-gadgets-32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles/academic.css">
  <style>
    /* Projects page extras */
    .projects-page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      margin-top: 8px;
    }
    .pg-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .pg-card:hover {
      box-shadow: 0 4px 20px rgba(29,78,216,0.09);
      border-color: var(--accent);
    }
    .pg-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
      background: var(--border);
    }
    .pg-card-body {
      padding: 16px;
    }
    .pg-card-body h3 {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .pg-links { display: flex; gap: 12px; }
    .pg-links a {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
    }
    .pg-links a:hover { text-decoration: underline; }
    .back-link { margin-top: 32px; font-size: 0.875rem; }
  </style>
  <title>Projects — Gana Sai Teja</title>
</head>
<body>

  <!-- NAV -->
  <nav id="navbar">
    <div class="nav-inner">
      <a href="../v2/index.html" class="nav-brand">Gana Sai Teja</a>
      <button class="nav-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')" aria-label="Menu">
        <i class="fas fa-bars"></i>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="../v2/index.html#about">About</a></li>
        <li><a href="../v2/index.html#news">News</a></li>
        <li><a href="../v2/index.html#research">Research</a></li>
        <li><a href="../v2/index.html#education">Education</a></li>
        <li><a href="https://drive.google.com/file/d/1bsDCIo_e-tgRVwhk1Ahb2YjOj5zMXr1u/view?usp=sharing" target="_blank" class="nav-cv">CV ↗</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <section id="projects-page" style="border-bottom:none;">
      <h2 class="sec-title">All Projects</h2>
      <div class="projects-page-grid" id="grid"></div>
      <p class="back-link"><a href="../v2/index.html">← Back to homepage</a></p>
    </section>
  </main>

  <footer>
    <p>Gana Sai Teja Velicheti &nbsp;·&nbsp; <a href="mailto:velichetiganasaiteja@gmail.com">velichetiganasaiteja@gmail.com</a></p>
  </footer>

  <script>
    const projects = [
      { name: "Property Rental", img: "images/Screenshot 2025-07-27 114548.png", live: "https://property-rental-kohl.vercel.app/", code: "https://github.com/gana-18/property-rental" },
      { name: "Meme Gallery — Infinite Scroll", img: "images/Screenshot 2025-07-27 174921.png", live: "https://meme-gallery-nine.vercel.app/", code: "https://github.com/gana-18/meme-gallery-nextjs" },
      { name: "InsideCode Community Blog", img: "images/Screenshot 2023-09-29 191318.png", live: "https://community-blogging.onrender.com/", code: "https://github.com/gana-18/community-blogging" },
      { name: "Finance Tracker", img: "images/Screenshot 2023-06-27 152917.png", live: "https://gana-18.github.io/finance-tracker/", code: "https://github.com/gana-18/finance-tracker" },
      { name: "Climate Webapp", img: "images/Screenshot 2023-03-19 123535.png", live: "https://github.com/gana-18/Climate-webapp", code: "https://github.com/gana-18/Climate-webapp" },
      { name: "StoryBook", img: "images/Screenshot 2023-03-19 123736.png", live: "https://storybooks-app.up.railway.app/", code: "https://github.com/gana-18/storybooks" },
      { name: "Restaurant", img: "images/rest.jpg", live: "https://gana-18.github.io/restaurant/", code: "https://github.com/gana-18/restaurant" },
      { name: "Tip Calculator", img: "images/calc.jpg", live: "https://gana-18.github.io/tip-calculator/", code: "https://github.com/gana-18/tip-calculator" },
      { name: "Link Saver — Chrome Extension", img: "images/chrome.jpg", live: "https://github.com/gana-18/chrome-extension", code: "https://github.com/gana-18/chrome-extension" },
      { name: "BlackJack Game", img: "images/Screenshot 2022-06-26 191314.jpg", live: "https://gana-18.github.io/BlackJack-Game/", code: "https://github.com/gana-18/BlackJack-Game" },
    ];

    const grid = document.getElementById('grid');
    projects.forEach(p => {
      grid.innerHTML += `
        <div class="pg-card">
          <img src="${p.img}" alt="${p.name}" loading="lazy">
          <div class="pg-card-body">
            <h3>${p.name}</h3>
            <div class="pg-links">
              <a href="${p.live}" target="_blank">Live ↗</a>
              <a href="${p.code}" target="_blank">Code ↗</a>
            </div>
          </div>
        </div>`;
    });
  </script>
</body>
</html>
